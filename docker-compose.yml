version: '3.8'

services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: cg10-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=cg10paper2024
      - DOCKER_INFLUXDB_INIT_ORG=paper-mill
      - DOCKER_INFLUXDB_INIT_BUCKET=dryer-temperatures
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=cg10-secret-token-2024
    volumes:
      - ./influxdb-data:/var/lib/influxdb2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
